<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="bodyGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066B3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bellyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0F2FE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#BAE6FD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Body shadow -->
  <ellipse cx="105" cy="155" rx="50" ry="15" fill="rgba(0,0,0,0.1)"/>

  <!-- Main body (whale shape) -->
  <path d="M 160 100
           Q 165 70 145 55
           Q 120 35 85 40
           Q 50 45 40 70
           Q 30 95 45 115
           Q 60 135 100 140
           Q 140 145 160 125
           Q 175 110 160 100Z"
        fill="url(#bodyGradient)"/>

  <!-- Belly -->
  <path d="M 145 95
           Q 140 80 115 75
           Q 85 72 65 80
           Q 50 88 55 105
           Q 70 125 100 128
           Q 135 130 145 110
           Q 152 100 145 95Z"
        fill="url(#bellyGradient)"/>

  <!-- Tail -->
  <path d="M 40 75 Q 20 60 25 50 Q 35 55 45 70Z" fill="url(#bodyGradient)"/>
  <path d="M 45 100 Q 20 105 25 120 Q 35 110 50 105Z" fill="url(#bodyGradient)"/>

  <!-- Dorsal fin -->
  <path d="M 120 55 Q 130 35 115 40 Q 110 50 115 60Z" fill="url(#bodyGradient)"/>

  <!-- Sad eye (left) -->
  <ellipse cx="130" cy="88" rx="12" ry="14" fill="white"/>
  <ellipse cx="130" cy="90" rx="6" ry="7" fill="#1E3A5F"/>
  <circle cx="128" cy="87" r="2" fill="white"/>

  <!-- Sad eye (right) -->
  <ellipse cx="145" cy="93" rx="5" ry="6" fill="white"/>
  <ellipse cx="145" cy="95" rx="3" ry="4" fill="#1E3A5F"/>

  <!-- Sad eyebrows -->
  <path d="M 118 72 Q 125 75 138 73" fill="none" stroke="#1E3A5F" stroke-width="2" stroke-linecap="round"/>

  <!-- Sad mouth (frown) -->
  <path d="M 125 110 Q 135 102 145 110" fill="none" stroke="#1E3A5F" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Tear drop -->
  <path d="M 120 100 Q 118 108 120 112 Q 122 108 120 100Z" fill="#0EA5E9">
    <animate attributeName="opacity" values="0.8;0.4;0.8" dur="1s" repeatCount="indefinite"/>
  </path>

  <!-- Blowhole -->
  <ellipse cx="100" cy="52" rx="5" ry="3" fill="#0EA5E9"/>

  <!-- Recovery prompt bubble -->
  <g transform="translate(150, 20)">
    <rect x="0" y="0" width="45" height="24" rx="8" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1"/>
    <text x="22.5" y="16" font-size="10" fill="#92400E" text-anchor="middle">Retry?</text>
  </g>

  <!-- Cheek blush (more visible when sad) -->
  <ellipse cx="118" cy="100" rx="8" ry="4" fill="#FDA4AF" opacity="0.5"/>
</svg>
