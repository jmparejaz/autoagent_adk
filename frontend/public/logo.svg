<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066B3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E3A8A;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#logoGradient)"/>

  <!-- Agent/AI Symbol -->
  <g fill="white">
    <!-- Central node -->
    <circle cx="50" cy="50" r="8"/>

    <!-- Outer nodes -->
    <circle cx="50" cy="25" r="5"/>
    <circle cx="71" cy="37.5" r="5"/>
    <circle cx="71" cy="62.5" r="5"/>
    <circle cx="50" cy="75" r="5"/>
    <circle cx="29" cy="62.5" r="5"/>
    <circle cx="29" cy="37.5" r="5"/>

    <!-- Connecting lines -->
    <line x1="50" y1="42" x2="50" y2="30" stroke="white" stroke-width="2"/>
    <line x1="57" y1="46" x2="66" y2="40" stroke="white" stroke-width="2"/>
    <line x1="57" y1="54" x2="66" y2="60" stroke="white" stroke-width="2"/>
    <line x1="50" y1="58" x2="50" y2="70" stroke="white" stroke-width="2"/>
    <line x1="43" y1="54" x2="34" y2="60" stroke="white" stroke-width="2"/>
    <line x1="43" y1="46" x2="34" y2="40" stroke="white" stroke-width="2"/>
  </g>

  <!-- AI brain pattern overlay -->
  <g fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1">
    <path d="M 35 35 Q 50 30 65 35 Q 70 50 65 65 Q 50 70 35 65 Q 30 50 35 35"/>
  </g>
</svg>
